name: condojet

services:
  api-python:
    image: condojet-api-python:local
    build:
      context: ./api-python
    container_name: condojet-api-python
    restart: unless-stopped
    env_file:
      - ./config/env/.env.dsv
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
      DB_HOST: host.docker.internal
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-condojethmg}
      DB_PASSWORD: ${DB_PASSWORD:-condoJetNovo2026}
      DB_NAME: ${DB_NAME:-condojethmg}
      API_DATABASE_URL: ${API_DATABASE_URL_DOCKER:-postgresql+psycopg://condojethmg:condoJetNovo2026@host.docker.internal:5432/condojethmg}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${API_APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)\""]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    image: condojet-backend:local
    build:
      context: ./backend
    container_name: condojet-backend
    restart: unless-stopped
    env_file:
      - ./config/env/.env.dsv
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
      BFF_API_PYTHON_BASE_URL: http://api-python:8000/api/v1
    ports:
      - "${BFF_PORT:-3000}:3000"
    depends_on:
      api-python:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    image: condojet-frontend:local
    build:
      context: ./frontend
    container_name: condojet-frontend
    restart: unless-stopped
    env_file:
      - ./config/env/.env.dsv
    environment:
      TZ: ${APP_TIMEZONE:-America/Sao_Paulo}
      VITE_BACKEND_URL: ${WEB_VITE_BACKEND_URL:-http://localhost:3000/api/v1}
      VITE_APP_TIMEZONE: ${WEB_VITE_APP_TIMEZONE:-America/Sao_Paulo}
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
