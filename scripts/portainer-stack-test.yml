version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: condojet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: condojethmg
      POSTGRES_USER: condojethmg
      POSTGRES_PASSWORD: condoJetNovo2026
      TZ: America/Sao_Paulo
    ports:
      - "5832:5432"
    volumes:
      - condojet_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U condojethmg -d condojethmg"]
      interval: 10s
      timeout: 5s
      retries: 12

  db-init:
    image: postgres:16-alpine
    container_name: condojet-db-init
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    environment:
      PGPASSWORD: condoJetNovo2026
    volumes:
      - ../database/ddl/001_init_condojet.sql:/sql/001_init_condojet.sql:ro
    command:
      - sh
      - -c
      - |
        psql -h postgres -U condojethmg -d condojethmg -v ON_ERROR_STOP=1 -f /sql/001_init_condojet.sql

  api-python:
    image: brdocker2020/condojet-api-python:latest
    container_name: condojet-api-python
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      API_APP_NAME: CondoJET API
      API_APP_ENV: development
      API_APP_PORT: 8000
      API_DATABASE_URL: postgresql+psycopg://condojethmg:condoJetNovo2026@postgres:5432/condojethmg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: condojethmg
      DB_PASSWORD: condoJetNovo2026
      DB_NAME: condojethmg
      DB_SCHEMA: admcondojet
      API_JWT_SECRET: change-me
      API_JWT_EXPIRES_MINUTES: 60
      API_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      API_GLOBAL_API_KEY: condojet-global-dsv-2026
      API_GLOBAL_ADMIN_NAME: Admin Global CondoJET
      API_GLOBAL_ADMIN_EMAIL: admin.global@condojet.app
      API_GLOBAL_ADMIN_PASSWORD: condojetGlobal#2026
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    image: brdocker2020/condojet-backend:latest
    container_name: condojet-backend
    restart: unless-stopped
    depends_on:
      api-python:
        condition: service_healthy
    environment:
      BFF_NODE_ENV: development
      BFF_PORT: 3000
      BFF_API_PYTHON_BASE_URL: http://api-python:8000/api/v1
      BFF_CORS_ORIGIN: https://condojet.esteiraweb.com.br
      BFF_GLOBAL_API_KEY: condojet-global-dsv-2026
      API_GLOBAL_API_KEY: condojet-global-dsv-2026
      API_GLOBAL_ADMIN_EMAIL: admin.global@condojet.app
      API_GLOBAL_ADMIN_NAME: Admin Global CondoJET
      API_GLOBAL_ADMIN_PASSWORD: condojetGlobal#2026
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.condojet-api.rule=Host(`condojet.esteiraweb.com.br`) && PathPrefix(`/api/v1`)"
      - "traefik.http.services.condojet-api.loadbalancer.server.port=3000"
      - "traefik.http.routers.condojet-api.service=condojet-api"
      - "traefik.http.routers.condojet-api.entrypoints=websecure"
      - "traefik.http.routers.condojet-api.tls.certresolver=leresolver"
      - "traefik.http.routers.condojet-api.priority=100"
      - "traefik.docker.network=traefik-public"
    networks:
      - default
      - portainer_default

  frontend:
    image: brdocker2020/condojet-frontend:latest
    container_name: condojet-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_BACKEND_URL: /api/v1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.condojet-frontend.rule=Host(`condojet.esteiraweb.com.br`)"
      - "traefik.http.services.condojet-frontend.loadbalancer.server.port=5173"
      - "traefik.http.routers.condojet-frontend.service=condojet-frontend"
      - "traefik.http.routers.condojet-frontend.entrypoints=websecure"
      - "traefik.http.routers.condojet-frontend.tls.certresolver=leresolver"
      - "traefik.docker.network=traefik-public"
    networks:
      - default
      - portainer_default
volumes:
  condojet_pgdata:

networks:
  portainer_default:
    external: true
