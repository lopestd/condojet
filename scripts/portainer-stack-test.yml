services:
  api-python:
    image: brdocker2020/condojet-api-python:latest
    container_name: condojet-api-python
    restart: unless-stopped
    environment:
      API_APP_NAME: ${API_APP_NAME}
      API_APP_ENV: ${API_APP_ENV}
      API_APP_PORT: ${API_APP_PORT}
      API_DATABASE_URL: ${API_DATABASE_URL}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_SCHEMA: ${DB_SCHEMA}
      API_JWT_SECRET: ${API_JWT_SECRET}
      API_JWT_EXPIRES_MINUTES: ${API_JWT_EXPIRES_MINUTES}
      API_CORS_ORIGINS: ${API_CORS_ORIGINS}
      API_GLOBAL_API_KEY: ${API_GLOBAL_API_KEY}
      API_GLOBAL_ADMIN_NAME: ${API_GLOBAL_ADMIN_NAME}
      API_GLOBAL_ADMIN_EMAIL: ${API_GLOBAL_ADMIN_EMAIL}
      API_GLOBAL_ADMIN_PASSWORD: ${API_GLOBAL_ADMIN_PASSWORD}
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)"
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - portainer_default

  backend:
    image: brdocker2020/condojet-backend:latest
    container_name: condojet-backend
    restart: unless-stopped
    depends_on:
      api-python:
        condition: service_healthy
    environment:
      BFF_NODE_ENV: ${BFF_NODE_ENV}
      BFF_PORT: ${BFF_PORT}
      BFF_API_PYTHON_BASE_URL: ${BFF_API_PYTHON_BASE_URL}
      BFF_CORS_ORIGIN: ${BFF_CORS_ORIGIN}
      BFF_GLOBAL_API_KEY: ${BFF_GLOBAL_API_KEY}
      API_GLOBAL_API_KEY: ${API_GLOBAL_API_KEY}
      API_GLOBAL_ADMIN_EMAIL: ${API_GLOBAL_ADMIN_EMAIL}
      API_GLOBAL_ADMIN_NAME: ${API_GLOBAL_ADMIN_NAME}
      API_GLOBAL_ADMIN_PASSWORD: ${API_GLOBAL_ADMIN_PASSWORD}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/v1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.condojet-api.rule=Host(`${WEB_HOST}`) && PathPrefix(`/api/v1`)"
      - "traefik.http.services.condojet-api.loadbalancer.server.port=3000"
      - "traefik.http.routers.condojet-api.service=condojet-api"
      - "traefik.http.routers.condojet-api.entrypoints=${TRAEFIK_ENTRYPOINT}"
      - "traefik.http.routers.condojet-api.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.http.routers.condojet-api.priority=100"
      - "traefik.docker.network=portainer_default"
    networks:
      - portainer_default

  frontend:
    image: brdocker2020/condojet-frontend:latest
    container_name: condojet-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL}
      VITE_ALLOWED_HOSTS: ${VITE_ALLOWED_HOSTS}
      VITE_DEV_PORT: ${VITE_DEV_PORT}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.condojet-frontend.rule=Host(`${WEB_HOST}`)"
      - "traefik.http.services.condojet-frontend.loadbalancer.server.port=5173"
      - "traefik.http.routers.condojet-frontend.service=condojet-frontend"
      - "traefik.http.routers.condojet-frontend.entrypoints=${TRAEFIK_ENTRYPOINT}"
      - "traefik.http.routers.condojet-frontend.tls.certresolver=${TRAEFIK_CERTRESOLVER}"
      - "traefik.docker.network=portainer_default"
    networks:
      - portainer_default
networks:
  portainer_default:
    external: true
